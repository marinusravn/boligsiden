<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — BoligGram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .map-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
    }

    .map-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
    }

    .map-toolbar label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    .map-toolbar select {
      padding: 6px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-family: var(--font-sans);
      background: var(--color-white);
    }

    .map-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    .map-popup {
      font-family: var(--font-sans);
      min-width: 220px;
    }

    .map-popup-price {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--color-primary-dark);
      margin-bottom: 2px;
    }

    .map-popup-price.no-price {
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .map-popup-address {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 2px;
    }

    .map-popup-meta {
      font-size: 0.78rem;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .map-popup-details {
      display: flex;
      gap: 10px;
      font-size: 0.78rem;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    .map-popup-broker {
      font-size: 0.72rem;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }

    .map-popup-link {
      display: inline-block;
      padding: 5px 12px;
      background: var(--color-primary);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
    }

    .map-popup-link:hover {
      background: var(--color-primary-dark);
      color: white;
    }

    .map-popup-approx {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.68rem;
      color: var(--color-text-muted);
      font-style: italic;
    }

    .map-legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      background: var(--color-white);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      box-shadow: var(--shadow-md);
      font-size: 0.75rem;
      color: var(--color-text-secondary);
    }

    .map-legend h4 {
      font-size: 0.8rem;
      margin-bottom: 6px;
      color: var(--color-text);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.exact { background: #2c5f4a; }
    .legend-dot.approx { background: #e67e22; border: 2px dashed #b8651a; width: 14px; height: 14px; opacity: 0.7; }

    @media (max-width: 768px) {
      .map-toolbar {
        padding: 8px 12px;
        gap: 8px;
      }
      .map-legend {
        bottom: 12px;
        left: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-icon">BG</span>
        BoligGram
      </a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="listings.html">Listings</a>
        <a href="map.html" class="active">Map</a>
        <a href="add.html">Add Listing</a>
        <a href="subscribe.html">Subscribe</a>
      </nav>
    </div>
  </header>

  <div class="map-wrapper">
    <div class="map-toolbar">
      <label for="map-filter-brokerage">Broker:</label>
      <select id="map-filter-brokerage">
        <option value="">All</option>
      </select>
      <label for="map-filter-neighborhood">Area:</label>
      <select id="map-filter-neighborhood">
        <option value="">All</option>
      </select>
      <label for="map-filter-rooms">Rooms:</label>
      <select id="map-filter-rooms">
        <option value="">All</option>
      </select>
      <span class="map-count" id="map-count"></span>
    </div>
    <div id="map"></div>
    <div class="map-legend">
      <h4>Legend</h4>
      <div class="legend-item"><div class="legend-dot exact"></div> Exact address</div>
      <div class="legend-item"><div class="legend-dot approx"></div> Approximate location</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (async () => {
      await App.init();

      const map = L.map('map').setView([55.695, 12.570], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(map);

      const exactIcon = L.divIcon({
        className: 'map-marker-exact',
        html: '<div style="width:14px;height:14px;background:#2c5f4a;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -10],
      });

      const approxIcon = L.divIcon({
        className: 'map-marker-approx',
        html: '<div style="width:18px;height:18px;background:#e67e22;border:2px dashed #b8651a;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.2);opacity:0.8;"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -12],
      });

      let markers = [];

      function formatPrice(p) {
        if (!p) return null;
        return new Intl.NumberFormat('da-DK').format(p) + ' DKK';
      }

      function buildPopup(l) {
        const price = formatPrice(l.price_dkk);
        const addr = (l.street_name || '') + ' ' + (l.house_number || '');
        const floor = (l.floor_or_unit || l.floor) ? ', ' + (l.floor_or_unit || l.floor) : '';
        const isApprox = l.geo_confidence !== 'exact';
        const detailUrl = 'listing/' + l.listing_id + '.html';
        const area = l.approximate_area_sqm || l.area_m2;

        return `<div class="map-popup">
          <div class="map-popup-price${!price ? ' no-price' : ''}">${price || 'Price not listed'}</div>
          <div class="map-popup-address">${addr}${floor}</div>
          <div class="map-popup-meta">${l.postal_code || ''} ${l.city || ''} — ${l.neighborhood || ''}</div>
          <div class="map-popup-details">
            ${area ? '<span>' + area + ' m²</span>' : ''}
            ${l.rooms ? '<span>' + l.rooms + ' rooms</span>' : ''}
            ${l.property_type ? '<span>' + App.translatePropertyType(l.property_type) + '</span>' : ''}
          </div>
          <div class="map-popup-broker">${l.brokerage_name || ''}</div>
          <a href="${detailUrl}" class="map-popup-link">View details</a>
          ${isApprox ? '<div class="map-popup-approx">Approximate location</div>' : ''}
        </div>`;
      }

      function renderMarkers(filtered) {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        const bounds = [];
        filtered.forEach(l => {
          if (!l.latitude || !l.longitude) return;
          const isApprox = l.geo_confidence !== 'exact';
          const icon = isApprox ? approxIcon : exactIcon;
          const marker = L.marker([l.latitude, l.longitude], { icon })
            .bindPopup(buildPopup(l));
          marker.addTo(map);
          markers.push(marker);
          bounds.push([l.latitude, l.longitude]);

          if (isApprox) {
            const circle = L.circle([l.latitude, l.longitude], {
              radius: 200,
              color: '#e67e22',
              fillColor: '#e67e22',
              fillOpacity: 0.08,
              weight: 1,
              dashArray: '4 4',
            }).addTo(map);
            markers.push(circle);
          }
        });

        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
        }

        document.getElementById('map-count').textContent =
          filtered.length + ' listing' + (filtered.length !== 1 ? 's' : '') + ' on the map';
      }

      const brokerages = [...new Set(App.listings.map(l => l.brokerage_name).filter(Boolean))].sort();
      const neighborhoods = [...new Set(App.listings.map(l => l.neighborhood).filter(Boolean))].sort();
      const rooms = [...new Set(App.listings.map(l => l.rooms).filter(Boolean))].sort((a, b) => a - b);

      const bSel = document.getElementById('map-filter-brokerage');
      brokerages.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });

      const nSel = document.getElementById('map-filter-neighborhood');
      neighborhoods.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; nSel.appendChild(o); });

      const rSel = document.getElementById('map-filter-rooms');
      rooms.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r + ' rooms'; rSel.appendChild(o); });

      function applyMapFilters() {
        const brokerage = bSel.value;
        const neighborhood = nSel.value;
        const roomFilter = rSel.value;

        const filtered = App.listings.filter(l => {
          if (brokerage && l.brokerage_name !== brokerage) return false;
          if (neighborhood && l.neighborhood !== neighborhood) return false;
          if (roomFilter && l.rooms !== parseInt(roomFilter)) return false;
          return true;
        });

        renderMarkers(filtered);
      }

      bSel.addEventListener('change', applyMapFilters);
      nSel.addEventListener('change', applyMapFilters);
      rSel.addEventListener('change', applyMapFilters);

      renderMarkers(App.listings);
    })();
  </script>

</body>
</html>
